<!doctype html><html lang=zh-cn><head><meta charset=utf-8><meta name=viewport content="width=device-width,initial-scale=1"><title>404 - 红岩 | 个人博客</title><style>*{margin:0;padding:0;box-sizing:border-box}html,body{height:100%}:root{--bg:#111;--fg:#fff;--sub:#888;--btn-border:#555;--btn-hover-border:#aaa;--btn-hover-color:#ccc}@media(prefers-color-scheme:light){:root{--bg:#f5f5f5;--fg:#111;--sub:#888;--btn-border:#ccc;--btn-hover-border:#666;--btn-hover-color:#333}}body{display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--bg);color:var(--fg);font-family:-apple-system,BlinkMacSystemFont,segoe ui,sans-serif}.code{font-size:clamp(120px,20vw,220px);font-weight:900;line-height:1;letter-spacing:-4px;color:var(--fg);user-select:none}.msg{margin-top:16px;font-size:18px;color:var(--sub);letter-spacing:1px}.home-btn{margin-top:48px;display:inline-block;padding:10px 28px;border:1px solid var(--btn-border);border-radius:6px;color:var(--sub);text-decoration:none;font-size:14px;letter-spacing:1px;transition:border-color .2s,color .2s}.home-btn:hover{border-color:var(--btn-hover-border);color:var(--btn-hover-color)}</style></head><body><div class=code>404</div><p class=msg>页面不存在</p><a href=/ class=home-btn>返回主页</a></body></html>
